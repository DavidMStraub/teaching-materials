<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 40 300 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="vecD2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- radiale Feldrichtung (gestrichelt) -->
  <line x1="180" y1="400" x2="180" y2="70" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- Zielpunkt P2 -->
  <circle cx="180" cy="120" r="16" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="208" y="128" fill="#111827" font-size="26" font-style="italic">P<tspan font-size="18" dy="7">2</tspan></text>

  <!-- Kraft auf Probeladung -->
  <line x1="180" y1="284" x2="180" y2="204" stroke="#111827" stroke-width="5" marker-end="url(#arrDark)"/>
  <text x="204" y="245" fill="#111827" font-size="28" font-style="italic">F</text>
  <line x1="203" y1="218" x2="222" y2="218" stroke="#111827" stroke-width="2.8" marker-end="url(#vecD2)"/>

  <!-- Probeladung bei P1 -->
  <circle cx="180" cy="310" r="16" fill="#f59e0b"/>
  <text x="180" y="318" fill="#fff" font-size="22" text-anchor="middle" font-weight="bold">+</text>
  <text x="208" y="330" fill="#111827" font-size="26" font-style="italic">P<tspan font-size="18" dy="7">1</tspan><tspan dy="-7">, Q</tspan><tspan font-size="18" dy="7">P</tspan></text>

  <!-- Bewegung P1 -> P2 -->
  <line x1="112" y1="300" x2="112" y2="140" stroke="#15803d" stroke-width="4" marker-end="url(#arrGreen)"/>
  <text x="98" y="208" fill="#15803d" font-size="22" font-style="italic" text-anchor="end">W<tspan font-size="16" dy="6">12</tspan></text>
  <text x="98" y="240" fill="#15803d" font-size="22" text-anchor="end">&gt; 0</text>

  <!-- Quell-Ladung -->
  <circle cx="180" cy="450" r="34" fill="#ef4444"/>
  <text x="180" y="464" fill="#fff" font-size="42" text-anchor="middle" font-weight="bold">+</text>
  <text x="228" y="462" fill="#111827" font-size="28" font-style="italic">Q<tspan font-size="20" dy="7">+</tspan></text>
</svg>
