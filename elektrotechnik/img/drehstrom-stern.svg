<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 20 470 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrIy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrUy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <g stroke="#111827" stroke-width="2.5" fill="none">
    <!-- Klemmen L1 L2 L3 -->
    <circle cx="100" cy="60" r="5" fill="#fff"/>
    <circle cx="220" cy="60" r="5" fill="#fff"/>
    <circle cx="340" cy="60" r="5" fill="#fff"/>

    <!-- drei Straenge -->
    <line x1="100" y1="65" x2="100" y2="150"/>
    <rect x="88" y="150" width="24" height="60" fill="#fff"/>
    <line x1="100" y1="210" x2="100" y2="260"/>

    <line x1="220" y1="65" x2="220" y2="150"/>
    <rect x="208" y="150" width="24" height="60" fill="#fff"/>
    <line x1="220" y1="210" x2="220" y2="260"/>

    <line x1="340" y1="65" x2="340" y2="150"/>
    <rect x="328" y="150" width="24" height="60" fill="#fff"/>
    <line x1="340" y1="210" x2="340" y2="260"/>

    <!-- Sternpunkt und Neutralleiter -->
    <line x1="100" y1="260" x2="340" y2="260"/>
    <line x1="220" y1="260" x2="220" y2="310"/>
    <circle cx="220" cy="316" r="5" fill="#fff"/>
  </g>
  <circle cx="220" cy="260" r="4" fill="#111827"/>

  <!-- Strompfeile -->
  <line x1="120" y1="85" x2="120" y2="115" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrIy)"/>
  <line x1="200" y1="275" x2="200" y2="300" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrIy)"/>

  <!-- Strangspannung -->
  <line x1="400" y1="140" x2="400" y2="225" stroke="#6b7280" stroke-width="2.5" fill="none" marker-end="url(#arrUy)"/>

  <!-- Beschriftungen -->
  <text x="100" y="42" fill="#111827" font-size="20" font-weight="bold" text-anchor="middle">L1</text>
  <text x="220" y="42" fill="#111827" font-size="20" font-weight="bold" text-anchor="middle">L2</text>
  <text x="340" y="42" fill="#111827" font-size="20" font-weight="bold" text-anchor="middle">L3</text>
  <text x="244" y="323" fill="#111827" font-size="20" font-weight="bold">N</text>
  <text x="132" y="107" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">1</tspan></text>
  <text x="158" y="296" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">N</tspan></text>
  <text x="120" y="190" fill="#111827" font-size="22" font-style="italic" text-decoration="underline">Z</text>
  <text x="240" y="190" fill="#111827" font-size="22" font-style="italic" text-decoration="underline">Z</text>
  <text x="360" y="190" fill="#111827" font-size="22" font-style="italic" text-decoration="underline">Z</text>
  <text x="410" y="190" fill="#6b7280" font-size="19" font-style="italic">U<tspan font-size="14" dy="6">Str</tspan></text>
</svg>
