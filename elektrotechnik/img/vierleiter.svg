<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 60 620 320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrI4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>

  <g stroke="#111827" stroke-width="2.5" fill="none">
    <!-- Stromquelle links (Querstrich innen) -->
    <circle cx="80" cy="180" r="24"/>
    <line x1="56" y1="180" x2="104" y2="180"/>
    <line x1="80" y1="100" x2="80" y2="156"/>
    <line x1="80" y1="204" x2="80" y2="260"/>
    <!-- Strompfeil neben der Quelle -->
    <line x1="42" y1="162" x2="42" y2="130" stroke-width="3" marker-end="url(#arrI4)"/>

    <!-- stromführende Leitungen (mit Leitungswiderstand R_L) -->
    <line x1="80" y1="100" x2="220" y2="100"/>
    <rect x="220" y="88" width="60" height="24" fill="#fff"/>
    <line x1="280" y1="100" x2="570" y2="100"/>
    <line x1="570" y1="100" x2="570" y2="140"/>

    <line x1="80" y1="260" x2="220" y2="260"/>
    <rect x="220" y="248" width="60" height="24" fill="#fff"/>
    <line x1="280" y1="260" x2="570" y2="260"/>
    <line x1="570" y1="260" x2="570" y2="220"/>

    <!-- Sensor R_theta -->
    <rect x="556" y="140" width="28" height="80" fill="#fff"/>

    <!-- Sense-Leitungen: direkt an den Sensorklemmen abgegriffen -->
    <line x1="570" y1="125" x2="330" y2="125" stroke="#15803d"/>
    <line x1="330" y1="125" x2="330" y2="157" stroke="#15803d"/>
    <line x1="570" y1="235" x2="330" y2="235" stroke="#15803d"/>
    <line x1="330" y1="235" x2="330" y2="203" stroke="#15803d"/>

    <!-- Voltmeter -->
    <circle cx="330" cy="180" r="24" stroke="#15803d"/>
  </g>

  <!-- Abgriffpunkte -->
  <circle cx="570" cy="125" r="5" fill="#111827"/>
  <circle cx="570" cy="235" r="5" fill="#111827"/>

  <!-- Beschriftungen -->
  <text x="330" y="189" fill="#15803d" font-size="24" text-anchor="middle" font-weight="bold">V</text>
  <text x="20" y="152" fill="#111827" font-size="24" font-style="italic">I</text>
  <text x="234" y="78" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">L</tspan></text>
  <text x="234" y="238" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">L</tspan></text>
  <text x="598" y="188" fill="#111827" font-size="24" font-style="italic">R<tspan font-size="17" dy="7">&#977;</tspan></text>
  <text x="252" y="152" fill="#15803d" font-size="20" font-style="italic">U<tspan font-size="15" dy="6">&#977;</tspan></text>
  <text x="376" y="168" fill="#15803d" font-size="17">I = 0:</text>
  <text x="376" y="192" fill="#15803d" font-size="17">kein Spannungsabfall!</text>
</svg>
