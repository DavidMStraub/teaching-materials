<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrF2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="vecDark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="vecGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Abstand r -->
  <line x1="170" y1="150" x2="470" y2="150" stroke="#9ca3af" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="315" y="138" fill="#6b7280" font-size="24" font-style="italic" text-anchor="middle">r</text>

  <!-- Einheitsvektor r/r -->
  <line x1="320" y1="205" x2="395" y2="205" stroke="#6b7280" stroke-width="3" marker-end="url(#arrR)"/>
  <text x="330" y="244" fill="#6b7280" font-size="22" font-style="italic">r / r</text>
  <line x1="331" y1="222" x2="343" y2="222" stroke="#6b7280" stroke-width="2.2" marker-end="url(#vecGray)"/>

  <!-- Q1 -->
  <circle cx="140" cy="150" r="30" fill="#ef4444"/>
  <text x="140" y="162" fill="#fff" font-size="36" text-anchor="middle" font-weight="bold">+</text>
  <text x="130" y="218" fill="#111827" font-size="26" font-style="italic">Q<tspan font-size="18" dy="6">1</tspan></text>

  <!-- Q2 -->
  <circle cx="500" cy="150" r="30" fill="#ef4444"/>
  <text x="500" y="162" fill="#fff" font-size="36" text-anchor="middle" font-weight="bold">+</text>
  <text x="490" y="218" fill="#111827" font-size="26" font-style="italic">Q<tspan font-size="18" dy="6">2</tspan></text>

  <!-- Kraft auf Q2 -->
  <line x1="540" y1="150" x2="640" y2="150" stroke="#111827" stroke-width="4.5" marker-end="url(#arrF2)"/>
  <text x="566" y="120" fill="#111827" font-size="27" font-style="italic">F<tspan font-size="18" dy="6">12</tspan></text>
  <line x1="566" y1="94" x2="584" y2="94" stroke="#111827" stroke-width="2.5" marker-end="url(#vecDark)"/>

  <!-- Kraft auf Q1 -->
  <line x1="100" y1="150" x2="20" y2="150" stroke="#111827" stroke-width="4.5" marker-end="url(#arrF2)"/>
  <text x="40" y="120" fill="#111827" font-size="27" font-style="italic">F<tspan font-size="18" dy="6">21</tspan></text>
  <line x1="40" y1="94" x2="58" y2="94" stroke="#111827" stroke-width="2.5" marker-end="url(#vecDark)"/>
</svg>
