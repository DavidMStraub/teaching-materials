<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 30 560 330" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrI2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrU2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <g stroke="#111827" stroke-width="2.5" fill="none">
    <!-- Quelle -->
    <circle cx="90" cy="195" r="26"/>
    <line x1="90" y1="80" x2="90" y2="169"/>
    <line x1="90" y1="221" x2="90" y2="310"/>

    <!-- obere und untere Schiene -->
    <line x1="90" y1="80" x2="500" y2="80"/>
    <line x1="90" y1="310" x2="500" y2="310"/>

    <!-- Klemmen 1-2 -->
    <circle cx="185" cy="80" r="5" fill="#fff"/>
    <circle cx="185" cy="310" r="5" fill="#fff"/>

    <!-- Strompfeil Ie -->
    <line x1="120" y1="64" x2="152" y2="64" stroke-width="3" marker-end="url(#arrI2)"/>

    <!-- Zweig L -->
    <line x1="310" y1="80" x2="310" y2="155"/>
    <rect x="296" y="155" width="28" height="80" fill="#111827"/>
    <line x1="310" y1="235" x2="310" y2="310"/>
    <line x1="288" y1="102" x2="288" y2="130" stroke-width="3" marker-end="url(#arrI2)"/>

    <!-- Zweig R + C in Reihe -->
    <line x1="460" y1="80" x2="460" y2="125"/>
    <rect x="448" y="125" width="24" height="60" fill="#fff"/>
    <line x1="460" y1="185" x2="460" y2="235"/>
    <!-- Kondensator -->
    <line x1="436" y1="235" x2="484" y2="235" stroke-width="3.5"/>
    <line x1="436" y1="253" x2="484" y2="253" stroke-width="3.5"/>
    <line x1="460" y1="253" x2="460" y2="310"/>
    <line x1="432" y1="95" x2="432" y2="120" stroke-width="3" marker-end="url(#arrI2)"/>

    <!-- Spannungspfeile -->
    <line x1="345" y1="160" x2="345" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU2)"/>
    <line x1="500" y1="128" x2="500" y2="182" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU2)"/>
    <line x1="500" y1="230" x2="500" y2="258" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU2)"/>
    <line x1="130" y1="150" x2="130" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU2)"/>
  </g>

  <!-- Quellensymbol ~ -->
  <text x="90" y="204" fill="#111827" font-size="30" text-anchor="middle">~</text>

  <!-- Beschriftungen -->
  <text x="126" y="52" fill="#111827" font-size="22" font-style="italic">I<tspan font-size="16" dy="6">e</tspan></text>
  <text x="205" y="72" fill="#111827" font-size="20" font-weight="bold">1</text>
  <text x="205" y="336" fill="#111827" font-size="20" font-weight="bold">2</text>
  <text x="140" y="205" fill="#6b7280" font-size="22" font-style="italic">U<tspan font-size="16" dy="6">e</tspan></text>
  <text x="42" y="203" fill="#111827" font-size="22" font-style="italic">U</text>
  <text x="255" y="122" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">L</tspan></text>
  <text x="260" y="203" fill="#111827" font-size="24" font-style="italic">L</text>
  <text x="355" y="203" fill="#6b7280" font-size="20" font-style="italic">U<tspan font-size="15" dy="6">L</tspan></text>
  <text x="392" y="112" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">R</tspan></text>
  <text x="415" y="162" fill="#111827" font-size="24" font-style="italic">R</text>
  <text x="510" y="162" fill="#6b7280" font-size="20" font-style="italic">U<tspan font-size="15" dy="6">R</tspan></text>
  <text x="408" y="252" fill="#111827" font-size="24" font-style="italic">C</text>
  <text x="510" y="252" fill="#6b7280" font-size="20" font-style="italic">U<tspan font-size="15" dy="6">C</tspan></text>
</svg>
