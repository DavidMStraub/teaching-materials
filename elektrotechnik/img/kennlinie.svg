<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 30 450 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Achsen -->
  <line x1="70" y1="400" x2="435" y2="400" stroke="#9ca3af" stroke-width="2" marker-end="url(#axG)"/>
  <line x1="70" y1="400" x2="70" y2="50" stroke="#9ca3af" stroke-width="2" marker-end="url(#axG)"/>
  <text x="440" y="425" fill="#6b7280" font-size="24" font-style="italic">I</text>
  <text x="38" y="62" fill="#6b7280" font-size="24" font-style="italic">U</text>

  <!-- ideale Spannungsquelle -->
  <line x1="70" y1="110" x2="420" y2="110" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="290" y="98" fill="#2563eb" font-size="19">ideale U-Quelle</text>

  <!-- ideale Stromquelle -->
  <line x1="380" y1="400" x2="380" y2="80" stroke="#15803d" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="262" y="65" fill="#15803d" font-size="19">ideale I-Quelle</text>

  <!-- reale Quelle -->
  <line x1="70" y1="110" x2="380" y2="400" stroke="#111827" stroke-width="4"/>
  <text x="212" y="222" fill="#111827" font-size="20">reale Quelle</text>
  <text x="248" y="250" fill="#111827" font-size="19">Steigung &#8722;R<tspan font-size="14" dy="5">i</tspan></text>

  <!-- Achsenabschnitte -->
  <text x="30" y="118" fill="#111827" font-size="22" font-style="italic">U<tspan font-size="16" dy="6">0</tspan></text>
  <text x="370" y="430" fill="#111827" font-size="22" font-style="italic">I<tspan font-size="16" dy="6">k</tspan></text>
  <circle cx="70" cy="110" r="5" fill="#111827"/>
  <circle cx="380" cy="400" r="5" fill="#111827"/>
</svg>
