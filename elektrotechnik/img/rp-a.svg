<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" font-family="Helvetica, Arial, sans-serif">
  <text x="10" y="28" fill="#111827" font-size="24" font-weight="bold">a)</text>
  <g stroke="#111827" stroke-width="2.5" fill="none">
    <!-- Klemmen -->
    <circle cx="22" cy="60" r="5"/>
    <circle cx="318" cy="140" r="5"/>
    <!-- Zuleitungen -->
    <line x1="27" y1="60" x2="60" y2="60"/>
    <line x1="280" y1="140" x2="313" y2="140"/>
    <!-- oberer Pfad: A -> R1 -> Ecke -> B -->
    <line x1="60" y1="60" x2="130" y2="60"/>
    <rect x="130" y="48" width="60" height="24" fill="#fff"/>
    <line x1="190" y1="60" x2="280" y2="60"/>
    <line x1="280" y1="60" x2="280" y2="140"/>
    <!-- diagonaler Pfad: durchgehende Linie, R2-Körper maskiert die Mitte -->
    <line x1="60" y1="60" x2="280" y2="140"/>
    <g transform="rotate(19.98 170 100)">
      <rect x="140" y="88" width="60" height="24" fill="#fff"/>
    </g>
  </g>
  <!-- Knoten -->
  <circle cx="60" cy="60" r="5" fill="#111827"/>
  <circle cx="280" cy="140" r="5" fill="#111827"/>
  <text x="145" y="38" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">1</tspan></text>
  <text x="150" y="155" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">2</tspan></text>
</svg>
