<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 0 620 350" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <g stroke="#111827" stroke-width="2.5" fill="none">
    <!-- oberer Zweig mit Stromquelle I_B1 (Querstrich innen, Pfeil daneben) -->
    <line x1="100" y1="120" x2="100" y2="60"/>
    <line x1="100" y1="60" x2="228" y2="60"/>
    <circle cx="250" cy="60" r="22"/>
    <line x1="250" y1="38" x2="250" y2="82"/>
    <line x1="272" y1="60" x2="420" y2="60"/>
    <line x1="420" y1="60" x2="420" y2="120"/>
    <!-- Strompfeil neben der Quelle -->
    <line x1="232" y1="30" x2="268" y2="30" stroke-width="3" marker-end="url(#arrI)"/>

    <!-- mittlerer Zweig: U_B (Längsstrich innen) und R1 -->
    <line x1="100" y1="120" x2="163" y2="120"/>
    <circle cx="185" cy="120" r="22"/>
    <line x1="163" y1="120" x2="207" y2="120"/>
    <line x1="207" y1="120" x2="255" y2="120"/>
    <rect x="255" y="108" width="60" height="24" fill="#fff"/>
    <line x1="315" y1="120" x2="420" y2="120"/>
    <!-- Spannungspfeil U_B unter der Quelle -->
    <line x1="205" y1="152" x2="167" y2="152" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU)"/>

    <!-- linker Zweig: R2 -->
    <line x1="100" y1="120" x2="100" y2="180"/>
    <rect x="88" y="180" width="24" height="60" fill="#fff"/>
    <line x1="100" y1="240" x2="100" y2="300"/>

    <!-- Stromquelle I_B2 (Querstrich innen, Pfeil daneben) -->
    <line x1="420" y1="120" x2="420" y2="178"/>
    <circle cx="420" cy="200" r="22"/>
    <line x1="398" y1="200" x2="442" y2="200"/>
    <line x1="420" y1="222" x2="420" y2="300"/>
    <!-- Strompfeil neben der Quelle (abwärts) -->
    <line x1="456" y1="182" x2="456" y2="218" stroke-width="3" marker-end="url(#arrI)"/>

    <!-- untere Schiene -->
    <line x1="100" y1="300" x2="495" y2="300"/>

    <!-- Klemmen 1-2 und Last Ra -->
    <line x1="420" y1="120" x2="495" y2="120"/>
    <circle cx="502" cy="120" r="5"/>
    <circle cx="502" cy="300" r="5"/>
    <line x1="509" y1="120" x2="580" y2="120"/>
    <line x1="509" y1="300" x2="580" y2="300"/>
    <line x1="580" y1="120" x2="580" y2="180"/>
    <rect x="568" y="180" width="24" height="60" fill="#fff"/>
    <line x1="580" y1="240" x2="580" y2="300"/>
    <!-- Strompfeil Ia auf dem Leiter -->
    <line x1="520" y1="120" x2="548" y2="120" stroke-width="3" marker-end="url(#arrI)"/>
    <!-- Spannungspfeil Ua -->
    <line x1="537" y1="165" x2="537" y2="255" stroke="#6b7280" stroke-width="2" marker-end="url(#arrU)"/>
    <!-- Strompfeile I1, I2 -->
    <line x1="340" y1="102" x2="368" y2="102" stroke-width="3" marker-end="url(#arrI)"/>
    <line x1="128" y1="270" x2="128" y2="242" stroke-width="3" marker-end="url(#arrI)"/>
  </g>

  <!-- Knoten -->
  <circle cx="100" cy="120" r="5" fill="#111827"/>
  <circle cx="420" cy="120" r="5" fill="#111827"/>
  <circle cx="420" cy="300" r="5" fill="#111827"/>

  <!-- Beschriftungen -->
  <text x="222" y="20" fill="#111827" font-size="22" font-style="italic">I<tspan font-size="16" dy="6">B1</tspan></text>
  <text x="170" y="180" fill="#6b7280" font-size="22" font-style="italic">U<tspan font-size="16" dy="6">B</tspan></text>
  <text x="272" y="96" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">1</tspan></text>
  <text x="334" y="92" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">1</tspan></text>
  <text x="52" y="218" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">2</tspan></text>
  <text x="142" y="262" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">2</tspan></text>
  <text x="470" y="206" fill="#111827" font-size="22" font-style="italic">I<tspan font-size="16" dy="6">B2</tspan></text>
  <text x="516" y="106" fill="#111827" font-size="20" font-style="italic">I<tspan font-size="15" dy="6">a</tspan></text>
  <text x="496" y="216" fill="#6b7280" font-size="20" font-style="italic">U<tspan font-size="15" dy="6">a</tspan></text>
  <text x="602" y="216" fill="#111827" font-size="22" font-style="italic">R<tspan font-size="16" dy="6">a</tspan></text>
  <text x="478" y="102" fill="#111827" font-size="20" font-weight="bold">1</text>
  <text x="478" y="332" fill="#111827" font-size="20" font-weight="bold">2</text>
</svg>
