name: Build and Deploy Presentations

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Convert Markdown to HTML
        run: |
          chmod +x scripts/convert-to-html.sh
          ./scripts/convert-to-html.sh

      - name: Create cache directory
        run: mkdir -p ~/.cache/public-slides-images

      - name: Cache downloaded images
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/public-slides-images
          key: ${{ runner.os }}-images-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-images-

      - name: Install Pandoc from GitHub releases
        run: |
          PANDOC_VERSION=3.7.0.2
          wget -q -P /tmp https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb
          sudo dpkg -i /tmp/pandoc-${PANDOC_VERSION}-1-amd64.deb
          pandoc --version

      - name: Install Typst
        run: |
          # Extract outside the workspace — anything left in the repo dir gets
          # picked up by create-index.sh and deployed!
          TYPST_VERSION=v0.15.0
          curl -sL "https://github.com/typst/typst/releases/download/${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" | tar -xJ -C /tmp
          sudo mv /tmp/typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          typst --version

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji curl unzip
          mkdir -p ~/.fonts
          # Fira Sans / Fira Mono (headings, code)
          curl -sL -o /tmp/fira.zip https://github.com/mozilla/Fira/archive/refs/tags/4.202.zip
          unzip -q /tmp/fira.zip -d /tmp/fira 'Fira-4.202/otf/FiraSans-*' 'Fira-4.202/otf/FiraMono-*'
          cp /tmp/fira/Fira-4.202/otf/*.otf ~/.fonts/
          # Libertinus incl. Math (body font is bundled with typst, Math is not)
          LIBERTINUS_VERSION=7.051
          curl -sL -o /tmp/libertinus.zip "https://github.com/alerque/libertinus/releases/download/v${LIBERTINUS_VERSION}/Libertinus-${LIBERTINUS_VERSION}.zip"
          unzip -q /tmp/libertinus.zip -d /tmp/libertinus
          cp /tmp/libertinus/Libertinus-${LIBERTINUS_VERSION}/static/OTF/*.otf ~/.fonts/
          echo "TYPST_FONT_PATHS=$HOME/.fonts" >> "$GITHUB_ENV"
          fc-cache -f ~/.fonts || true

      - name: Restore PDF cache
        # Restores previously built PDFs and the success manifest from the last run.
        # restore-keys finds the latest matching cache even if the exact key doesn't exist yet.
        uses: actions/cache/restore@v4
        with:
          path: |
            **/*.pdf
            ~/.cache/pdf-manifest.txt
          # v3: discards PDFs from the first typst run, which had recorded
          # rate-limited placeholder builds as successes in the manifest
          key: ${{ runner.os }}-pdf-v3-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pdf-v3-

      - name: Clean up orphaned HTML/PDF files
        run: |
          # Remove HTML files without corresponding .md source
          find . -name "*.html" -type f ! -name "index.html" | while read -r html; do
            md="${html%.html}.md"
            if [ ! -f "$md" ]; then
              echo "Removing orphaned HTML: $html"
              rm -f "$html"
            fi
          done
          # Remove PDF files without corresponding .md source (includes cached PDFs)
          find . -name "*.pdf" -type f | while read -r pdf; do
            md="${pdf%.pdf}.md"
            if [ ! -f "$md" ]; then
              echo "Removing orphaned PDF: $pdf"
              rm -f "$pdf"
            fi
          done

      - name: Convert Markdown to PDF
        run: |
          chmod +x scripts/convert-to-pdf-typst.sh
          # Manifest format: "<sha256hash>\t<filepath>" — one line per successfully compiled file.
          # A file is skipped only if its hash matches the manifest AND the PDF exists.
          # On failure the entry is removed, so the next run retries even without a file change.
          MANIFEST="$HOME/.cache/pdf-manifest.txt"
          touch "$MANIFEST"

          find . -name "*.md" -type f | while read -r file; do
            basename_file=$(basename "$file")
            if [ "$basename_file" = "README.md" ] || [ "$basename_file" = "LICENSE.md" ]; then
              continue
            fi

            pdf_enabled=$(awk '/^---$/ {in_fm=1; next} in_fm && /^---$/ {exit} in_fm && /^pdf:/ {gsub(/^pdf:[ \t]*/, ""); gsub(/[ \t"]*$/, ""); print; found=1} END {if (!found) print "true"}' "$file")
            [ "$pdf_enabled" = "false" ] && echo "Skipping $file (pdf: false)" && continue

            FILE_HASH=$(sha256sum "$file" | cut -d' ' -f1)
            PDF_FILE="${file%.md}.pdf"
            STORED_HASH=$(awk -v p="$file" -F'\t' '$2==p {print $1; exit}' "$MANIFEST")

            if [ "$STORED_HASH" = "$FILE_HASH" ] && [ -f "$PDF_FILE" ]; then
              echo "Skipping $file (unchanged, PDF exists)"
              continue
            fi

            echo "Converting $file to PDF..."
            if ./scripts/convert-to-pdf-typst.sh "$file"; then
              awk -v p="$file" -F'\t' '$2 != p' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
              printf '%s\t%s\n' "$FILE_HASH" "$file" >> "$MANIFEST"
            else
              # Remove entry so the next run retries this file
              awk -v p="$file" -F'\t' '$2 != p' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
              echo "Warning: Failed to convert $file"
            fi
          done
        continue-on-error: true

      - name: Save image cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/public-slides-images
          key: ${{ runner.os }}-images-${{ github.run_id }}

      - name: Save PDF cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            **/*.pdf
            ~/.cache/pdf-manifest.txt
          key: ${{ runner.os }}-pdf-v3-${{ github.run_id }}

      - name: Generate Index
        run: |
          chmod +x scripts/create-index.sh
          ./scripts/create-index.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload HTML and PDF files from the repository root
          path: '.'
          # Exclude markdown files and scripts from deployment
          exclude: |
            *.md
            scripts/
            .git/
            .github/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on main branch pushes, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4